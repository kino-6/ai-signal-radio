sources:
  - name: arxiv-ai
    type: arxiv
    enabled: true
    params:
      search_query: "cat:cs.AI OR cat:cs.CL OR cat:cs.LG"
      max_results: 10
      timeout_seconds: 15
      rate_limit_seconds: 1.0

  - name: hacker-news-ai
    type: hackernews
    enabled: true
    params:
      query: "AI LLM OpenAI Anthropic agent model"
      limit: 10
      timeout_seconds: 15
      rate_limit_seconds: 0.5

tts:
  enabled: false
  endpoint: "http://127.0.0.1:50021"
  speaker: 3
  speed_scale: 1.18
  pitch_scale: 0.0
  intonation_scale: 1.0
  pronunciation_profile: null

ranker:
  keyword_bonus: 2.0
  official_source_bonus: 4.0
  research_bonus: 2.0
  hn_points_divisor: 100.0
  hn_points_cap: 3.0
