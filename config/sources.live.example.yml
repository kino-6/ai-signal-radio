sources:
  - name: arxiv-ai
    type: arxiv
    enabled: true
    params:
      search_query: "cat:cs.AI OR cat:cs.CL OR cat:cs.LG"
      max_results: 10

  - name: hacker-news-ai
    type: hackernews
    enabled: true
